<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Sun -->
  <circle cx="320" cy="180" r="70" fill="url(#sun)" opacity="0.95"/>

  <!-- Cloud -->
  <g filter="url(#shadow)">
    <circle cx="190" cy="250" r="55" fill="white"/>
    <circle cx="260" cy="225" r="70" fill="white"/>
    <circle cx="335" cy="255" r="50" fill="white"/>
    <rect x="150" y="250" width="235" height="65" rx="32" fill="white"/>
  </g>

  <!-- Minimal weather sparkle -->
  <g opacity="0.85">
    <circle cx="150" cy="150" r="5" fill="white"/>
    <circle cx="390" cy="110" r="4" fill="white"/>
    <circle cx="410" cy="320" r="6" fill="white"/>
  </g>
</svg>